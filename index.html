<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Builds Viewer</title>
    <!-- Google Fonts: Inter & Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>Pokemon Builds Viewer</h1>
            <p>M-1 シングル構築データ解析</p>
        </header>
        
        <main class="main-content">
            <!-- Sidebar: Ranking -->
            <aside class="ranking-panel glass-panel">
                <h2>採用率ランキング</h2>
                <div id="loading-indicator" class="loading">データを読み込み中...</div>
                <ul id="pokemon-list" class="pokemon-list">
                    <!-- JSで動的に追加 -->
                </ul>
            </aside>
            
            <!-- Main Detail Area -->
            <section class="detail-panel glass-panel" id="detail-panel" style="display: none;">
                <div class="detail-header">
                    <h2 id="detail-name">ポケモン名</h2>
                    <span class="usage-badge" id="detail-usage">採用率: --%</span>
                </div>
                
                <div class="stats-grid">
                    <!-- もちもの割合 -->
                    <div class="stat-card glass-card">
                        <h3>もちもの割合</h3>
                        <div class="chart-container">
                            <canvas id="itemChart"></canvas>
                        </div>
                    </div>
                    
                    <!-- 素早さ分布 -->
                    <div class="stat-card glass-card">
                        <h3>素早さ実数値 分布</h3>
                        <div class="chart-container">
                            <canvas id="speedChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="table-container glass-card">
                    <h3>もちもの別 実数値一覧表 (最頻値)</h3>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>もちもの</th>
                                <th>性格</th>
                                <th>H</th>
                                <th>A</th>
                                <th>B</th>
                                <th>C</th>
                                <th>D</th>
                                <th>S</th>
                                <th>採用数</th>
                            </tr>
                        </thead>
                        <tbody id="stats-tbody">
                            <!-- JSで追加 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
